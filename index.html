<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrolan Privat E2E</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sembunyikan elemen secara lalai untuk pengurusan paparan */
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans">

    <!-- LAYAR MEMUAT (LOADING) -->
    <div id="loading-screen" class="flex h-screen items-center justify-center bg-gray-100 text-lg font-semibold text-gray-700">
        Memuat sistem...
    </div>

    <!-- LAYAR BERGABUNG (LOGIN) -->
    <div id="join-screen" class="hidden flex h-screen items-center justify-center bg-gray-200 px-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-[#075E54] p-6 text-center text-white">
                <div class="flex justify-center mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </div>
                <h1 class="text-2xl font-bold">Obrolan Privat</h1>
                <p class="text-sm opacity-80 mt-1">Hanya bisa diakses dengan kunci rahasia</p>
            </div>
            <form id="join-form" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Anda</label>
                    <input type="text" id="input-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#128C7E] focus:outline-none" placeholder="Misal: Budi" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kunci Ruangan Rahasia</label>
                    <input type="text" id="input-room" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#128C7E] focus:outline-none" placeholder="Misal: rahasia123" />
                </div>
                <button type="submit" class="w-full bg-[#128C7E] text-white py-3 rounded-lg font-semibold hover:bg-[#075E54] transition-colors">
                    Masuk ke Percakapan
                </button>
            </form>
        </div>
    </div>

    <!-- LAYAR OBROLAN (CHAT) -->
    <div id="chat-screen" class="hidden flex flex-col h-screen bg-[#efeae2]">
        <!-- HEADER -->
        <header class="bg-[#075E54] text-white p-3 flex items-center justify-between shadow-md z-10">
            <div class="flex items-center space-x-3">
                <div id="chat-avatar" class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center text-[#075E54] font-bold text-lg">
                    --
                </div>
                <div>
                    <h2 id="chat-room-id" class="font-semibold text-lg leading-tight">Ruang: -</h2>
                    <p id="chat-user-name" class="text-xs text-[#d9fdd3]">Login sebagai: -</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button id="btn-export" title="Ekspor ke Spreadsheet (CSV)" class="p-2 hover:bg-[#128C7E] rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                </button>
                <button id="btn-logout" title="Keluar" class="p-2 hover:bg-[#128C7E] rounded-full transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- CHAT AREA -->
        <main id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[url('https://i.pinimg.com/originals/8c/98/99/8c98994518b575bfd8c949e91d20548b.jpg')] bg-cover bg-fixed">
            <!-- Mesej akan dimasukkan di sini oleh JavaScript -->
        </main>

        <!-- INPUT AREA -->
        <footer class="bg-[#f0f2f5] p-3 flex flex-col relative">
            
            <!-- Banner Edit -->
            <div id="edit-banner" class="hidden flex items-center justify-between bg-blue-50 p-2 rounded-lg border-l-4 border-blue-500 mb-2 w-full shadow-sm">
                <div class="flex flex-col overflow-hidden mr-2">
                    <span class="text-xs font-bold text-blue-600">Edit Pesan</span>
                    <span id="edit-text-preview" class="text-sm text-gray-600 truncate">...</span>
                </div>
                <button id="btn-cancel-edit" class="text-gray-500 hover:text-gray-800 p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <div class="flex items-center space-x-2 w-full">
                <input type="file" id="file-input" accept="image/*" class="hidden" />
                <button id="btn-image" class="p-3 text-gray-500 hover:text-gray-700 hover:bg-gray-200 rounded-full transition disabled:opacity-50" title="Kirim Foto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                </button>
                
                <form id="chat-form" class="flex-1 flex items-center bg-white rounded-full px-4 py-2 shadow-sm">
                    <input type="text" id="chat-input" placeholder="Ketik pesan..." class="flex-1 bg-transparent focus:outline-none text-gray-700" />
                </form>
                
                <button id="btn-send" class="p-3 bg-[#128C7E] text-white rounded-full hover:bg-[#075E54] transition shadow-sm disabled:opacity-50 disabled:bg-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- MODUL FIREBASE & LOGIK APLIKASI -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 1. Inisialisasi Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // State Aplikasi
        let currentUser = null;
        let profile = null; // { name, roomId }
        let messagesData = [];
        let editingMsgId = null;
        let isUploading = false;
        let unsubscribeMessages = null;

        // Elemen DOM
        const elLoading = document.getElementById('loading-screen');
        const elJoin = document.getElementById('join-screen');
        const elChat = document.getElementById('chat-screen');
        const elMessages = document.getElementById('chat-messages');
        const elInput = document.getElementById('chat-input');
        const elBtnSend = document.getElementById('btn-send');
        const elBtnImage = document.getElementById('btn-image');
        const elFileInput = document.getElementById('file-input');
        const elEditBanner = document.getElementById('edit-banner');
        const elEditTextPreview = document.getElementById('edit-text-preview');

        // Fungsi Keselamatan (Elak XSS)
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // 2. Autentikasi Firebase
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        }
        
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            elLoading.classList.add('hidden');
            if (currentUser && profile) {
                showChatScreen();
            } else {
                showJoinScreen();
            }
        });

        initAuth();

        // 3. Pengurusan Paparan (Routing)
        function showJoinScreen() {
            elJoin.classList.remove('hidden');
            elChat.classList.add('hidden');
        }

        function showChatScreen() {
            elJoin.classList.add('hidden');
            elChat.classList.remove('hidden');
            
            document.getElementById('chat-room-id').textContent = `Ruang: ${profile.roomId}`;
            document.getElementById('chat-user-name').textContent = `Login sebagai: ${profile.name}`;
            document.getElementById('chat-avatar').textContent = profile.roomId.substring(0, 2).toUpperCase();
            
            loadMessages();
        }

        document.getElementById('join-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('input-name').value.trim();
            const roomId = document.getElementById('input-room').value.trim();
            if (name && roomId) {
                const cleanRoomId = roomId.toLowerCase().replace(/[^a-z0-9]/g, '');
                profile = { name, roomId: cleanRoomId };
                showChatScreen();
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            profile = null;
            if (unsubscribeMessages) unsubscribeMessages();
            showJoinScreen();
        });

        // 4. Logik Mesej
        function loadMessages() {
            if (!currentUser || !profile) return;

            const roomCollection = collection(db, 'artifacts', appId, 'public', 'data', `chat_${profile.roomId}`);
            
            if (unsubscribeMessages) unsubscribeMessages();

            unsubscribeMessages = onSnapshot(roomCollection, (snapshot) => {
                messagesData = [];
                snapshot.forEach((doc) => {
                    messagesData.push({ id: doc.id, ...doc.data() });
                });
                // Urut di memori
                messagesData.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderMessages();
            }, (error) => {
                console.error("Gagal memuat pesan:", error);
            });
        }

        function renderMessages() {
            elMessages.innerHTML = '';
            
            if (messagesData.length === 0) {
                elMessages.innerHTML = `
                    <div class="flex justify-center mt-10">
                        <div class="bg-[#FFF3C7] text-gray-700 px-4 py-2 rounded-lg text-sm shadow-sm text-center max-w-sm">
                            Kirim pesan pertama Anda. Pesan ini dienkripsi secara E2E di dalam ruang "${escapeHTML(profile.roomId)}".
                        </div>
                    </div>`;
                return;
            }

            let htmlString = '';
            messagesData.forEach((msg) => {
                const isMe = msg.senderId === currentUser.uid;
                const timeStr = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : '';
                
                let contentHTML = '';
                if (msg.isDeleted) {
                    contentHTML = `<p class="text-gray-500 italic text-[14px] flex items-center pr-10">🚫 Pesan ini telah dihapus</p>`;
                } else {
                    if (msg.type === 'image' && msg.imageUrl) {
                        contentHTML = `<img src="${escapeHTML(msg.imageUrl)}" alt="Terkirim" class="rounded-md max-w-full h-auto mb-1" />`;
                    } else {
                        contentHTML = `<p class="text-gray-800 text-[15px] pr-6 whitespace-pre-wrap">${escapeHTML(msg.text)}</p>`;
                    }
                }

                let actionsHTML = '';
                if (isMe && !msg.isDeleted) {
                    actionsHTML = `
                        <div class="flex space-x-2 text-gray-400">
                            ${msg.type === 'text' ? `<button class="btn-edit hover:text-blue-500 transition" data-id="${msg.id}" data-text="${escapeHTML(msg.text)}" title="Edit Pesan"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></button>` : ''}
                            <button class="btn-delete hover:text-red-500 transition" data-id="${msg.id}" title="Hapus Pesan"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                        </div>
                    `;
                }

                htmlString += `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'} mb-2">
                        <div class="max-w-[75%] rounded-lg p-2 shadow-sm relative ${isMe ? 'bg-[#d9fdd3] rounded-tr-none' : 'bg-white rounded-tl-none'}">
                            ${!isMe ? `<div class="text-xs font-bold text-[#128C7E] mb-1">${escapeHTML(msg.senderName)}</div>` : ''}
                            
                            ${contentHTML}

                            <div class="flex justify-end items-center space-x-2 mt-1">
                                ${actionsHTML}
                                <span class="text-[10px] text-gray-500">
                                    ${msg.isEdited ? '<span class="mr-1 italic">(diedit)</span>' : ''}
                                    ${timeStr}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            elMessages.innerHTML = htmlString;
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                elMessages.scrollTop = elMessages.scrollHeight;
            }, 100);
        }

        // Event Delegation untuk Edit dan Hapus
        elMessages.addEventListener('click', async (e) => {
            const btnEdit = e.target.closest('.btn-edit');
            const btnDelete = e.target.closest('.btn-delete');

            if (btnEdit) {
                editingMsgId = btnEdit.dataset.id;
                elInput.value = btnEdit.dataset.text;
                elEditTextPreview.textContent = btnEdit.dataset.text;
                elEditBanner.classList.remove('hidden');
                elInput.focus();
                updateInputState();
            }

            if (btnDelete) {
                const msgId = btnDelete.dataset.id;
                try {
                    const msgRef = doc(db, 'artifacts', appId, 'public', 'data', `chat_${profile.roomId}`, msgId);
                    await updateDoc(msgRef, {
                        isDeleted: true,
                        text: 'Pesan ini telah dihapus',
                        imageUrl: null
                    });
                } catch (error) {
                    console.error("Gagal menghapus pesan:", error);
                }
            }
        });

        // Batal Edit
        document.getElementById('btn-cancel-edit').addEventListener('click', () => {
            editingMsgId = null;
            elInput.value = '';
            elEditBanner.classList.add('hidden');
            updateInputState();
        });

        // Hantar Mesej
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const textToSend = elInput.value.trim();
            if (!textToSend || isUploading) return;

            elInput.value = '';

            try {
                if (editingMsgId) {
                    const msgRef = doc(db, 'artifacts', appId, 'public', 'data', `chat_${profile.roomId}`, editingMsgId);
                    await updateDoc(msgRef, {
                        text: textToSend,
                        isEdited: true
                    });
                    editingMsgId = null;
                    elEditBanner.classList.add('hidden');
                } else {
                    const roomCollection = collection(db, 'artifacts', appId, 'public', 'data', `chat_${profile.roomId}`);
                    await addDoc(roomCollection, {
                        text: textToSend,
                        senderId: currentUser.uid,
                        senderName: profile.name,
                        timestamp: Date.now(),
                        type: 'text'
                    });
                }
                scrollToBottom();
                updateInputState();
            } catch (error) {
                console.error("Gagal mengirim pesan:", error);
            }
        });

        // 5. Muat Naik Imej
        document.getElementById('btn-image').addEventListener('click', () => {
            if (!isUploading && !editingMsgId) elFileInput.click();
        });

        elFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            isUploading = true;
            updateInputState();
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);

                    try {
                        const roomCollection = collection(db, 'artifacts', appId, 'public', 'data', `chat_${profile.roomId}`);
                        await addDoc(roomCollection, {
                            imageUrl: compressedBase64,
                            senderId: currentUser.uid,
                            senderName: profile.name,
                            timestamp: Date.now(),
                            type: 'image'
                        });
                        isUploading = false;
                        elFileInput.value = '';
                        updateInputState();
                        scrollToBottom();
                    } catch (error) {
                        console.error("Gagal mengirim gambar:", error);
                        isUploading = false;
                        updateInputState();
                    }
                };
            };
        });

        function updateInputState() {
            if (isUploading) {
                elInput.placeholder = "Mengunggah gambar...";
                elInput.disabled = true;
                elBtnSend.disabled = true;
            } else if (editingMsgId) {
                elInput.placeholder = "Edit pesan Anda...";
                elInput.disabled = false;
                elBtnSend.disabled = elInput.value.trim() === '';
            } else {
                elInput.placeholder = "Ketik pesan...";
                elInput.disabled = false;
                elBtnSend.disabled = false;
            }
            
            elBtnImage.disabled = isUploading || editingMsgId !== null;
        }

        elInput.addEventListener('input', () => {
            elBtnSend.disabled = elInput.value.trim() === '' || isUploading;
        });

        // 6. Eksport ke CSV
        document.getElementById('btn-export').addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,Waktu,Pengirim,Pesan,Tipe\n";

            messagesData.forEach(m => {
                const date = m.timestamp ? new Date(m.timestamp).toLocaleString('id-ID') : '';
                const text = m.text ? `"${m.text.replace(/"/g, '""')}"` : '[Gambar]';
                const type = m.type || 'text';
                csvContent += `"${date}","${escapeHTML(m.senderName)}",${text},"${type}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Obrolan_${profile.roomId}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
